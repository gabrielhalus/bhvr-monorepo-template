services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-bunstack}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bunstack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bunstack
    working_dir: /usr/src/app/packages/shared
    command: ["bun", "run", "drizzle:push"]
    entrypoint: []
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-bunstack}

  bootstrap:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      migrations:
        condition: service_completed_successfully
    networks:
      - bunstack
    working_dir: /usr/src/app/packages/shared
    command: ["bun", "run", "drizzle:bootstrap"]
    entrypoint: []
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-bunstack}

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    networks:
      - bunstack
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-bunstack}

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SITE_URL: ${VITE_SITE_URL:-/}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - bunstack
    ports:
      - "8000:80"

networks:
  bunstack:
    driver: bridge

volumes:
  pgdata:
